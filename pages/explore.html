<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>
        Photography by Sagnik Singha
    </title>
    <link rel="stylesheet" href="explore.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script defer src="app.js"></script>
</head>

<body>

    <header class="header">
        <a href="../index.html" class="logo">Lightworks</a>
        <input type="checkbox" id="check">
        <label for="check" class="icons">
            <i class='bx bx-menu' id="menu-icon"></i>
            <i class='bx bx-x' id="close-icon"></i>
        </label>
        <nav class="navbar">
            <a href="../index.html" style="--i:0;">Home</a>
            <a href="#" style="--i:1; color: #000; box-shadow: 0 2px rgba(0, 0, 0, 0.3); ">Explore</a>
            <a href="about.html" style="--i:2;">About</a>
        </nav>
    </header>

    <div class="carousel">

        <div class="list">
            <div class="item" style="background-image: url(https://imgur.com/9ucI3d5.jpg);">
                
                <div class="content">
                    <div class="title">Visakhapatnam</div>
                    <div class="name">2020</div>
                    <div class="des">The iconic city with stunning sunrises on the beaches.</div>
                    <div class="btn">
                        <button><a href="../galleries/vizag.html">Visit</a></button>
                    </div>
                </div>

            </div>

            <div class="item" style="background-image: url(https://imgur.com/F7W1wm8.jpg);">

                <div class="content">
                    <div class="title">Kashmir</div>
                    <div class="name">2023</div>
                    <div class="des">Moody Kashmir scenes with rain and snow.</div>
                    <div class="btn">
                        <button><a href="../galleries/kashmir.html">Visit</a></button>
                    </div>
                </div>

            </div>

            <div class="item" style="background-image: url(https://imgur.com/t7l4Gib.png);">
                
                <div class="content">
                    <div class="title">Arunachal Pradesh</div>
                    <div class="name">2022</div>
                    <div class="des">The North-Eastern state in an unusual colour palette.</div>
                    <div class="btn">
                        <button><a href="../galleries/arunachal.html">Visit</a></button>
                    </div>
                </div>

            </div>
        </div>

        <!--next prev button-->
        <div class="arrows">
            <button class="prev"><</button>
            <button class="next">></button>
        </div>


        <!-- time running -->
        <div class="timeRunning"></div>

    </div>

    <script src="app.js"></script>

</body>

</html>
